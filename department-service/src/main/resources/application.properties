spring.application.name=department-service
server.port=8082

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/civicpulse_db
spring.datasource.username=postgres
spring.datasource.password=praga@2005
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Eureka Registry
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.enabled=true
spring.cloud.discovery.enabled=true

# Keycloak/OAuth2
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8085/realms/civicpulse
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8085/realms/civicpulse/protocol/openid-connect/certs
