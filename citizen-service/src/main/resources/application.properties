spring.application.name=citizen-service
server.port=8081

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/civicpulse_db
spring.datasource.username=postgres
spring.datasource.password=praga@2005
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Eureka Registry
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.enabled=true
spring.cloud.discovery.enabled=true

# Kafka Configuration

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=citizen-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Keycloak/OAuth2
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8085/realms/civicpulse
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8085/realms/civicpulse/protocol/openid-connect/certs
